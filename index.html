<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>
    <link rel="stylesheet" href="simulador.css">
</head>
<body>
 
    <div class="container">
        <div class="header">
    <img src="logo.png" alt="Logo Banco" class="logo">
    <h1>Simulador de Crédito</h1>
</div>

        <div class="seccion">
    <h2>Datos financieros</h2>
        <div class="campo">
    <label for="txtIngresos">Ingresos</label>
    <input type="text" id="txtIngresos" onblur="validarNumero('txtIngresos','errorIngresos')">
    <small id="errorIngresos" class="error"></small>
</div>
 
        <div class="campo">
    <label for="txtArriendo">Arriendo</label>
    <input type="text" id="txtArriendo" onblur="validarNumero('txtArriendo','errorArriendo')">
    <small id="errorArriendo" class="error"></small>
</div>

<div class="campo">
    <label for="txtAlimentacion">Alimentación</label>
    <input type="text" id="txtAlimentacion" onblur="validarNumero('txtAlimentacion','errorAlimentacion')">
    <small id="errorAlimentacion" class="error"></small>
</div>

<div class="campo">
    <label for="txtVarios">Varios</label>
    <input type="text" id="txtVarios" onblur="validarNumero('txtVarios','errorVarios')">
    <small id="errorVarios" class="error"></small>
</div>

<p>Total gastos: <span id="spnTotalGastos"></span></p>

 </div>
        <p>Disponible: <span id="spnDisponible" ></span></p>
        <p>Capacidad de pago mensual: <span id="spnCapacidadPago"></span></p>
        <div class="barra">
    <div id="barraCapacidad"></div>
</div>
 
        <div class="seccion">
    <h2>Solicitud de crédito</h2>
        <div class="campo">
    <label for="txtMonto">Monto solicitado</label>
    <input type="text" id="txtMonto" onblur="validarNumero('txtMonto','errorMonto')">
    <small id="errorMonto" class="error"></small>
</div>
 
        <div class="campo">
    <label for="txtPlazo">Plazo en años</label>
    <input type="text" id="txtPlazo" onblur="validarNumero('txtPlazo','errorPlazo')">
    <small id="errorPlazo" class="error"></small>
</div>
 
        <div class="campo">
    <label for="txtTasaInteres">Tasa de interés</label>
    <input type="text" id="txtTasaInteres" onblur="validarNumero('txtTasaInteres','errorTasa')">
    <small id="errorTasa" class="error"></small>
</div>
</div>
 
        <p>Interés a pagar: <span id="spnInteresPagar"></span></p>
        <p>Total préstamo: <span id="spnTotalPrestamo"></span></p>
        <p>Cuota mensual: <span id="spnCuotaMensual"></span></p>
        <p>Estado de crédito: <span id="spnEstadoCredito">ANALIZANDO...</span></p>
 
        <div class="buttons">
            <button id="btnCalcularCredito" onclick="calcular()">Calcular Crédito</button>
            <button id="btnReiniciar">Reiniciar</button>
        </div>
    </div>
 
 <script src="simulador.js"></script>
 <script src="funciones.js"></script>
</body>
</html>
